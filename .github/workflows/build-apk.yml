name: Build Android APK

# 触发条件：推送到 main 分支、手动触发、打 tag
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "index.html"
      - "vite.config.ts"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:
  release:
    types: [published]

# 同一时间只跑一个构建，避免重复
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 22（Capacitor 8 要求 Node >= 22）
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 配置 Java JDK 17（Android Gradle Plugin 8.x 要求）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装 npm 依赖
        run: npm ci

      - name: 构建前端 Web 资源
        run: npm run build

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 复制 Web 资源到 Android 工程
        run: npx cap copy android

      - name: 校验 Android 项目
        run: npx cap sync android

      - name: 设置 Gradle 权限
        run: chmod +x android/gradlew

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 重命名 APK（带 commit 短 SHA）
        run: |
          mkdir -p artifact
          SHORT_SHA=${GITHUB_SHA::7}
          BUILD_TIME=$(date -u +"%Y%m%d-%H%M")
          APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_DST="artifact/attendance-mall-${BUILD_TIME}-${SHORT_SHA}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          ls -lh artifact/

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: attendance-mall-apk
          path: artifact/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: 输出构建摘要
        run: |
          echo "## APK 构建结果 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 产物: \`$(basename ${{ env.APK_PATH }})\`" >> $GITHUB_STEP_SUMMARY
          echo "- 大小: $(du -h ${{ env.APK_PATH }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下载地址：进入 Actions 页 → 选择本次运行 → 滚动到底部 Artifacts 区下载" >> $GITHUB_STEP_SUMMARY
